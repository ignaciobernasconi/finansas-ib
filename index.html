<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansas IB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --purple: #6c5ce7; 
            --green: #00b894; --red: #d63031; --text: #ffffff; --gray: #aaa;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 450px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border-left: 6px solid var(--purple); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;
        }
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-menu button { background: #333; flex: 1; padding: 10px; font-size: 0.8rem; margin: 0; }
        
        button { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; 
            border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-add { background: var(--green); }
        .btn-save { background: var(--purple); }
        .btn-manual { background: #2d3436; border: 1px solid var(--purple); font-size: 0.9rem; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            background: #252525; color: white; border: 1px solid #333; box-sizing: border-box;
        }
        .hidden { display: none; }
        .item-list { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-delete { 
            width: auto; padding: 6px 12px; background: rgba(214, 48, 49, 0.1); 
            color: var(--red); border: 1px solid var(--red); font-size: 0.7rem; margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="profile-selection">
        <h1 style="text-align:center">Finansas IB</h1>
        <button onclick="selectProfile('Ignacio')" style="background:var(--purple)">Ignacio</button>
        <button onclick="selectProfile('Claudia')" style="background:#fd79a8">Claudia</button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px">
            <h2 id="user-display" style="margin:0; font-size: 1.1rem;"></h2>
            <button onclick="logout()" style="width:auto; background:#333; padding:5px 12px; margin:0; font-size:0.7rem">Salir</button>
        </div>

        <div class="nav-menu">
            <button onclick="showTab('home')">HOME</button>
            <button onclick="showTab('stats')">STATS</button>
            <button onclick="showTab('calendar')">MESES</button>
        </div>

        <div id="tab-home">
            <div class="card">
                <small style="color:var(--gray)">Saldo del Mes</small>
                <h1 id="net-balance" style="color:var(--green); margin:5px 0; font-size: 2.5rem;">$0</h1>
                <hr style="border:0; border-top:1px solid #333; margin:10px 0">
                <small style="color:var(--gray)">Ahorro Acumulado</small>
                <h2 id="total-saved-big" style="color:var(--purple); margin:5px 0">$0</h2>
            </div>

            <button class="btn-manual" onclick="agregarAhorroManual()">💰 CARGAR AHORRO INICIAL</button>
            <button class="btn-add" onclick="showTab('add')">+ NUEVO MOVIMIENTO</button>
            <button class="btn-save" onclick="cerrarMesAutomatico()">🔒 CERRAR MES (PASAR A AHORRO)</button>
            
            <h3 style="margin-top:20px; border-bottom: 1px solid #333; padding-bottom: 5px;">Historial</h3>
            <div id="history-list"></div>
        </div>

        <div id="tab-stats" class="hidden">
            <h3>Distribución de Gastos</h3>
            <div style="background:white; border-radius:15px; padding:15px"><canvas id="myChart"></canvas></div>
        </div>

        <div id="tab-calendar" class="hidden">
            <h3>Historial de Cierres</h3>
            <div id="calendar-list"></div>
        </div>
    </div>

    <div id="tab-add" class="hidden">
        <h2>Nuevo Registro</h2>
        <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
        <input type="text" id="desc" placeholder="Descripción">
        <select id="cat">
            <option value="Comida">Comida</option>
            <option value="Servicios">Servicios</option>
            <option value="Nafta">Nafta</option>
            <option value="Varios">Varios</option>
        </select>
        <div style="display:flex; gap:10px">
            <button onclick="addEntry('gasto')" style="background:var(--red)">GASTO</button>
            <button onclick="addEntry('ingreso')" style="background:var(--green)">INGRESO</button>
        </div>
        <button onclick="showTab('home')" style="background:#444">CANCELAR</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBCtAu5W-S48pICmS9H0k7mKLiJpNKHSoQ",
        authDomain: "finansas-ib.firebaseapp.com",
        projectId: "finansas-ib",
        storageBucket: "finansas-ib.firebasestorage.app",
        messagingSenderId: "699584425602",
        appId: "1:699584425602:web:0d793337469fbf02b00e9b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentUser = "", transactions = [], totalAhorrado = 0, currentSaldoNeto = 0, myChart = null;

    function selectProfile(name) {
        currentUser = name;
        document.getElementById('user-display').innerText = "Hola, " + name;
        document.getElementById('profile-selection').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        iniciarEscuchas();
    }

    function showTab(t) {
        ['home', 'stats', 'calendar', 'add'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        if(t === 'stats') updateChart();
    }

    function iniciarEscuchas() {
        db.collection("movimientos").where("perfil", "==", currentUser).orderBy("timestamp", "desc").onSnapshot(snap => {
            transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderUI();
        });
        db.collection("ahorros").doc(currentUser).onSnapshot(doc => {
            totalAhorrado = doc.exists ? doc.data().total : 0;
            document.getElementById('total-saved-big').innerText = "$" + totalAhorrado.toLocaleString();
        });
        db.collection("historial_cierres").where("perfil", "==", currentUser).orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('calendar-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="item-list" style="border-right: 4px solid var(--green)">
                    <strong>${d.mes} ${d.año}</strong>: +$${d.monto_final.toLocaleString()}</div>`;
            });
        });
    }

    function renderUI() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        let net = 0;
        transactions.forEach(t => {
            net += (t.type === 'ingreso' ? t.amount : -t.amount);
            list.innerHTML += `
                <div class="item-list" style="border-left: 5px solid ${t.type==='ingreso'?'var(--green)':'var(--red)'}">
                    <div><strong>${t.desc}</strong><br><small style="color:var(--gray)">${t.cat}</small></div>
                    <div style="text-align:right">
                        <div style="font-weight:bold; color:${t.type==='ingreso'?'var(--green)':'var(--red)'}">$${t.amount.toLocaleString()}</div>
                        <button class="btn-delete" onclick="borrarDato('${t.id}')">Borrar</button>
                    </div>
                </div>`;
        });
        currentSaldoNeto = net;
        document.getElementById('net-balance').innerText = "$" + net.toLocaleString();
    }

    function addEntry(type) {
        const amount = parseFloat(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if (!amount || !desc) return alert("Faltan datos");
        db.collection("movimientos").add({
            amount, desc, cat: document.getElementById('cat').value, type,
            perfil: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('amount').value = ""; document.getElementById('desc').value = "";
        showTab('home');
    }

    window.agregarAhorroManual = function() {
        const monto = parseFloat(prompt("¿Cuánto ahorro querés sumar a la caja hoy?"));
        if (isNaN(monto) || monto <= 0) return;
        db.collection("ahorros").doc(currentUser).set({ total: totalAhorrado + monto })
            .then(() => alert("¡Ahorro actualizado!"));
    };

    window.cerrarMesAutomatico = function() {
        if (currentSaldoNeto <= 0) return alert("No hay saldo positivo para ahorrar.");
        if (confirm(`¿Cerrar mes? Se guardarán $${currentSaldoNeto.toLocaleString()} en tus ahorros y se limpiará el historial.`)) {
            db.collection("ahorros").doc(currentUser).set({ total: totalAhorrado + currentSaldoNeto })
            .then(() => {
                return db.collection("historial_cierres").add({
                    perfil: currentUser, monto_final: currentSaldoNeto,
                    mes: new Date().toLocaleString('es-AR', { month: 'long' }),
                    año: new Date().getFullYear(), timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            })
            .then(() => {
                transactions.forEach(t => db.collection("movimientos").doc(t.id).delete());
                alert("¡Mes cerrado!");
            });
        }
    };

    function borrarDato(id) { if(confirm("¿Borrar?")) db.collection("movimientos").doc(id).delete(); }
    function logout() { location.reload(); }
    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const totals = {};
        transactions.filter(t => t.type === 'gasto').forEach(t => totals[t.cat] = (totals[t.cat] || 0) + t.amount);
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#6c5ce7', '#00b894', '#fd79a8', '#fab1a0'] }] } });
    }
</script>
</body>
</html>
