<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansas IB Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --purple: #8e44ad; 
            --green: #2ecc71; --red: #e74c3c; --yellow: #f1c40f; --blue: #3498db; --text: #ffffff; --gray: #aaa;
            --purple-shadow: rgba(142, 68, 173, 0.4);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 6px solid var(--purple); box-shadow: 0 10px 20px rgba(0,0,0,0.6); text-align: center; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; font-size: 1rem; }
        .btn-add { background: var(--green); }
        .btn-save { background: var(--purple); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; background: #2a2a2a; color: white; border: 1px solid #333; box-sizing: border-box; }
        .hidden { display: none !important; }
        .profile-card { background: var(--card); padding: 25px; border-radius: 25px; border-bottom: 5px solid var(--purple); cursor: pointer; text-align: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); display: flex; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(10px); }
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; }
        .nav-menu button { background: #252525; flex: 1; padding: 12px; font-size: 0.75rem; margin: 0; border-radius: 8px; border: 1px solid #333; color: var(--gray); }
        .nav-menu button.active { background: var(--purple); color: white; border-color: var(--purple); }
        .item-list { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .time-badge { font-size: 0.7rem; color: var(--gray); display: block; margin-top: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div id="profile-selection">
        <h1 onclick="activarAdmin()" style="text-align:center; margin-bottom:5px;">Finansas IB</h1>
        <p style="text-align:center; color:var(--gray); margin-bottom:30px">¿Quién está usando la app?</p>
        <div id="profiles-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:15px"></div>
        <button id="btn-admin-add" onclick="abrirCrearPerfil()" class="hidden" style="background:transparent; border:2px dashed var(--purple); color:var(--purple);">+ AGREGAR PERFIL</button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px">
            <h2 id="user-display" style="margin:0; font-size: 1rem;"></h2>
            <button onclick="location.reload()" style="width:auto; background:#252525; padding:5px 12px; margin:0; font-size:0.7rem">Salir</button>
        </div>
        
        <div class="nav-menu">
            <button id="nav-home" onclick="showTab('home')" class="active">INICIO</button>
            <button id="nav-stats" onclick="showTab('stats')">ESTADÍSTICAS</button>
            <button id="nav-ahorros" onclick="showTab('ahorros')">AHORROS</button>
        </div>

        <div id="tab-home">
            <div class="card">
                <small style="color:var(--gray)">Saldo del Mes</small>
                <h1 id="net-balance" style="color:var(--green); margin:5px 0; font-size: 2.8rem;">$0</h1>
                <h3 id="total-spent" style="color:var(--red); margin:0; font-size: 1.1rem; font-weight: normal; opacity: 0.8;">-$0 gastados</h3>
            </div>
            <button class="btn-add" onclick="showTab('add')">+ NUEVO MOVIMIENTO</button>
            <button class="btn-save" onclick="cerrarMesAutomatico()">🔒 CERRAR MES & AHORRAR</button>
            <div id="history-list" style="margin-top:20px"></div>
        </div>

        <div id="tab-stats" class="hidden">
            <div class="card" style="padding: 10px;"><canvas id="donutChart"></canvas></div>
            <div class="card" style="padding: 10px; border-left-color: var(--blue);"><canvas id="areaChart"></canvas></div>
            <button onclick="showTab('home')" style="background:#333">VOLVER</button>
        </div>

        <div id="tab-ahorros" class="hidden">
            <div class="card" style="border-left: 6px solid var(--green);">
                <small style="color:var(--gray)">Ahorro Total Acumulado</small>
                <h1 id="total-saved-big" style="color:var(--green); margin:10px 0">$0</h1>
            </div>
            <div id="meses-list"></div>
            <button onclick="showTab('home')" style="background:#333">VOLVER</button>
        </div>

        <div id="tab-add" class="hidden">
            <h2>Nuevo Registro</h2>
            <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
            <input type="text" id="desc" placeholder="Descripción">
            <select id="cat">
                <option value="Sueldo">Sueldo / Pago</option>
                <option value="Comida">Comida</option>
                <option value="Servicios">Servicios</option>
                <option value="Nafta">Nafta</option>
                <option value="Varios">Varios</option>
            </select>
            <div style="display:flex; gap:10px">
                <button onclick="addEntry('gasto')" style="background:var(--red); flex:1">GASTO</button>
                <button onclick="addEntry('ingreso')" style="background:var(--green); flex:1">INGRESO</button>
            </div>
            <button onclick="showTab('home')" style="background:#444">CANCELAR</button>
        </div>
    </div>
</div>

<div id="confirm-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px; border-left: 6px solid var(--red);">
        <h3>¿Borrar registro?</h3>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button id="btn-confirmar-borrar" style="background:var(--red); flex:1">BORRAR</button>
            <button onclick="cerrarModal('confirm-modal')" style="background:#444; flex:1">NO</button>
        </div>
    </div>
</div>

<div id="pin-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px;">
        <h3>Seguridad</h3>
        <input type="password" id="pin-input" placeholder="****" inputmode="numeric" maxlength="4" style="text-align:center; font-size:2rem; letter-spacing:15px;">
        <button id="btn-confirmar-pin" class="btn-add">ENTRAR</button>
        <button onclick="cerrarModal('pin-modal')" style="background:#444">VOLVER</button>
    </div>
</div>

<div id="nuevo-perfil-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px;">
        <h3>Nuevo Perfil</h3>
        <input type="text" id="nuevo-nombre-input" placeholder="Nombre">
        <input type="password" id="nuevo-pin-input" placeholder="PIN" inputmode="numeric" maxlength="4" style="text-align:center;">
        <button onclick="guardarNuevoPerfil()" class="btn-add">CREAR</button>
        <button onclick="cerrarModal('nuevo-perfil-modal')" style="background:#444">CANCELAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCtAu5W-S48pICmS9H0k7mKLiJpNKHSoQ",
        authDomain: "finansas-ib.firebaseapp.com",
        projectId: "finansas-ib",
        storageBucket: "finansas-ib.firebasestorage.app",
        messagingSenderId: "699584425602",
        appId: "1:699584425602:web:0d793337469fbf02b00e9b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = "", transactions = [], totalAhorrado = 0, currentSaldoNeto = 0, clicsAdmin = 0, donutChart = null, areaChart = null;

    function activarAdmin() {
        clicsAdmin++;
        if (clicsAdmin === 7) {
            const pass = prompt("Clave:");
            if (pass === "2026") { document.getElementById('btn-admin-add').classList.remove('hidden'); }
            clicsAdmin = 0;
        }
    }

    function inicializarApp() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
        cargarPerfiles();
    }

    function cargarPerfiles() {
        db.collection("config_perfiles").onSnapshot(snap => {
            const grid = document.getElementById('profiles-grid'); grid.innerHTML = "";
            snap.forEach(doc => {
                grid.innerHTML += `<div onclick="intentarAcceso('${doc.id}')" class="profile-card"><div style="font-size:2.5rem; margin-bottom:10px">👤</div><strong>${doc.id}</strong></div>`;
            });
        });
    }

    async function intentarAcceso(nombre) {
        const doc = await db.collection("config_perfiles").doc(nombre).get();
        const pinCorrecto = doc.data().pin;
        document.getElementById('pin-modal').classList.remove('hidden');
        document.getElementById('pin-input').value = "";
        document.getElementById('btn-confirmar-pin').onclick = () => {
            if(document.getElementById('pin-input').value === pinCorrecto) { cerrarModal('pin-modal'); selectProfile(nombre); }
            else { alert("❌ PIN Incorrecto"); }
        };
    }

    function selectProfile(name) {
        currentUser = name;
        document.getElementById('user-display').innerText = "Perfil: " + name;
        document.getElementById('profile-selection').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        iniciarEscuchas();
    }

    function iniciarEscuchas() {
        db.collection("movimientos").where("perfil", "==", currentUser).orderBy("timestamp", "desc").onSnapshot(snap => {
            transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderUI();
            if(!document.getElementById('tab-stats').classList.contains('hidden')) updateCharts();
        });
        db.collection("ahorros").doc(currentUser).onSnapshot(doc => {
            totalAhorrado = doc.exists ? doc.data().total : 0;
            document.getElementById('total-saved-big').innerText = "$" + totalAhorrado.toLocaleString();
        });
        db.collection("historial_cierres").where("perfil", "==", currentUser).orderBy("fecha", "desc").onSnapshot(snap => {
            const list = document.getElementById('meses-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="item-list"><span>${d.mes}</span><strong>$${d.monto.toLocaleString()}</strong></div>`;
            });
        });
    }

    function renderUI() {
        const list = document.getElementById('history-list'); list.innerHTML = "";
        let net = 0, spent = 0;
        transactions.forEach(t => {
            if(t.type === 'ingreso') net += t.amount; else { net -= t.amount; spent += t.amount; }
            
            // --- FORMATEO DE FECHA Y HORA ---
            let timeStr = "Pendiente...";
            if(t.timestamp) {
                const date = t.timestamp.toDate();
                const d = date.getDate().toString().padStart(2, '0');
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const h = date.getHours().toString().padStart(2, '0');
                const min = date.getMinutes().toString().padStart(2, '0');
                timeStr = `${d}/${m} - ${h}:${min}hs`;
            }

            list.innerHTML += `
                <div class="item-list" style="border-left: 5px solid ${t.type==='ingreso'?'var(--green)':'var(--red)'}">
                    <div>
                        <strong>${t.desc}</strong>
                        <span class="time-badge">${timeStr} | ${t.cat}</span>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold; color:${t.type==='ingreso'?'var(--green)':'var(--red)'}">$${t.amount.toLocaleString()}</div>
                        <button onclick="solicitarBorrar('${t.id}')" style="background:none; color:var(--red); font-size:0.7rem; padding:0">Borrar</button>
                    </div>
                </div>`;
        });
        document.getElementById('net-balance').innerText = "$" + net.toLocaleString();
        document.getElementById('total-spent').innerText = "-$" + spent.toLocaleString() + " gastados";
        currentSaldoNeto = net;
    }

    function updateCharts() {
        const gastos = transactions.filter(t => t.type === 'gasto');
        const cats = [...new Set(gastos.map(g => g.cat))];
        const donutData = cats.map(c => gastos.filter(g => g.cat === c).reduce((sum, current) => sum + current.amount, 0));
        
        const ctxDonut = document.getElementById('donutChart').getContext('2d');
        if(donutChart) donutChart.destroy();
        donutChart = new Chart(ctxDonut, {
            type: 'doughnut',
            data: { labels: cats, datasets: [{ data: donutData, backgroundColor: ['#8e44ad', '#2ecc71', '#e74c3c', '#f1c40f', '#3498db'] }] },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#aaa' } } } }
        });

        const movs = [...transactions].sort((a,b) => (a.timestamp?a.timestamp.toDate():0) - (b.timestamp?b.timestamp.toDate():0));
        let s = 0; const labels = []; const data = [];
        movs.forEach(t => {
            if(!t.timestamp) return;
            const f = t.timestamp.toDate().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
            if(t.type === 'ingreso') s += t.amount; else s -= t.amount;
            if(labels[labels.length-1] === f) data[data.length-1] = s; else { labels.push(f); data.push(s); }
        });
        const ctxArea = document.getElementById('areaChart').getContext('2d');
        if(areaChart) areaChart.destroy();
        areaChart = new Chart(ctxArea, {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Saldo', data: data, fill: true, backgroundColor: 'rgba(52, 152, 219, 0.2)', borderColor: '#3498db', tension: 0.3 }] },
            options: { scales: { y: { ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } }, plugins: { legend: { display: false } } }
        });
    }

    function addEntry(type) {
        const amount = parseFloat(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if (!amount || !desc) return;
        db.collection("movimientos").add({
            amount, desc, cat: document.getElementById('cat').value, type,
            perfil: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('amount').value = ""; document.getElementById('desc').value = "";
        showTab('home');
    }

    function solicitarBorrar(id) {
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('btn-confirmar-borrar').onclick = () => { db.collection("movimientos").doc(id).delete(); cerrarModal('confirm-modal'); };
    }

    function cerrarMesAutomatico() {
        if (currentSaldoNeto <= 0 || !confirm("¿Cerrar mes y ahorrar saldo?")) return;
        const mesAnio = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        db.collection("historial_cierres").add({ perfil: currentUser, mes: mesAnio, monto: currentSaldoNeto, fecha: firebase.firestore.FieldValue.serverTimestamp() });
        db.collection("ahorros").doc(currentUser).set({ total: totalAhorrado + currentSaldoNeto })
        .then(() => transactions.forEach(t => db.collection("movimientos").doc(t.id).delete()));
    }

    function showTab(t) {
        ['home', 'stats', 'ahorros', 'add'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('nav-'+(t==='add'?'home':t));
        if(btn) btn.classList.add('active');
        if(t === 'stats') setTimeout(updateCharts, 100);
    }

    function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
    function abrirCrearPerfil() { document.getElementById('nuevo-perfil-modal').classList.remove('hidden'); }
    async function guardarNuevoPerfil() {
        const n = document.getElementById('nuevo-nombre-input').value.trim();
        const p = document.getElementById('nuevo-pin-input').value.trim();
        if(n && p.length >= 4) { await db.collection("config_perfiles").doc(n).set({ pin: p }); cerrarModal('nuevo-perfil-modal'); }
    }

    inicializarApp();
</script>
</body>
</html>
