<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansas IB Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --purple: #8e44ad; 
            --green: #2ecc71; --red: #e74c3c; --text: #ffffff; --gray: #777;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* PERFILES */
        .section-title { font-size: 0.8rem; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px 10px; text-align: left; width: 100%; }
        .main-profiles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .guest-profiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .profile-card { background: var(--card); border-radius: 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; border: 1px solid #222; position: relative; overflow: hidden; }
        .profile-card.main { padding: 25px 10px; border-bottom: 4px solid var(--purple); }
        .profile-card.main .avatar { width: 60px; height: 60px; font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(45deg, var(--purple), #6c5ce7); }
        .profile-card.guest { padding: 15px 5px; background: #111; }
        .profile-card.guest .avatar { width: 40px; height: 40px; font-size: 1.1rem; margin-bottom: 5px; background: #333; }
        .profile-card.guest .name { font-size: 0.8rem; color: #bbb; }
        .avatar { border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .name { font-weight: 600; }

        /* DASHBOARD */
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 6px solid var(--purple); text-align: center; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-add { background: var(--green); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; background: #222; color: white; border: 1px solid #333; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(10px); }
        
        /* NAVEGACIÓN Y LISTA */
        .nav-menu { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-menu button { background: #1a1a1a; flex: 1; padding: 10px; font-size: 0.7rem; color: var(--gray); margin: 0; }
        .nav-menu button.active { background: var(--purple); color: white; }
        .item-list { background: var(--card); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="profile-selection">
        <h1 onclick="activarAdmin()" style="text-align:center; margin-top:30px; letter-spacing: -1px;">Finansas IB</h1>
        <div class="section-title">Principales</div>
        <div id="main-profiles-container" class="main-profiles"></div>
        <div class="section-title">Amigos</div>
        <div id="guest-profiles-container" class="guest-profiles"></div>
        <button id="btn-admin-add" onclick="abrirCrearPerfil()" class="hidden" style="background:transparent; border:1px dashed #444; color:#555; margin-top:30px; font-size: 0.8rem;">+ AGREGAR ESPACIO AMIGO</button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px">
            <span id="user-display" style="font-weight: bold; color: var(--purple);"></span>
            <button onclick="location.reload()" style="width:auto; background:#222; padding:5px 10px; margin:0; font-size:0.7rem">Salir</button>
        </div>
        <div class="nav-menu">
            <button id="nav-home" onclick="showTab('home')" class="active">INICIO</button>
            <button id="nav-stats" onclick="showTab('stats')">ESTADÍSTICAS</button>
            <button id="nav-ahorros" onclick="showTab('ahorros')">AHORROS</button>
        </div>

        <div id="tab-home">
            <div class="card">
                <small style="color:var(--gray)">SALDO ACTUAL</small>
                <h1 id="net-balance" style="color:var(--green); margin:5px 0; font-size: 2.8rem;">$0</h1>
                <h3 id="total-spent-display" style="color:var(--red); margin:0; font-size: 1.1rem; font-weight: normal; opacity: 0.8;">-$0 gastados este mes</h3>
            </div>
            <button class="btn-add" onclick="showTab('add')">+ CARGAR MOVIMIENTO</button>
            <button onclick="abrirCierreMes()" style="background:var(--purple); font-size: 0.8rem;">🔒 CIERRE DE MES & AHORRAR</button>
            <div id="history-list" style="margin-top:15px"></div>
        </div>

        <div id="tab-stats" class="hidden"><canvas id="donutChart"></canvas><br><canvas id="areaChart"></canvas></div>
        <div id="tab-ahorros" class="hidden"><div class="card"><small>TOTAL AHORRADO</small><h1 id="total-saved-big">$0</h1></div><div id="meses-list"></div></div>
        
        <div id="tab-add" class="hidden">
            <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
            <input type="text" id="desc" placeholder="¿Qué compraste o cobraste?">
            <select id="cat"><option value="Sueldo">Sueldo / Pago</option><option value="Comida">Comida</option><option value="Servicios">Servicios</option><option value="Nafta">Nafta</option><option value="Varios">Varios</option></select>
            <button onclick="addEntry('gasto')" style="background:var(--red)">ES GASTO</button>
            <button onclick="addEntry('ingreso')" style="background:var(--green)">ES INGRESO</button>
            <button onclick="showTab('home')" style="background:#333">CANCELAR</button>
        </div>
    </div>
</div>

<div id="alert-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px; border-left: 6px solid var(--purple);">
        <h3 id="alert-title">Aviso</h3>
        <p id="alert-msg" style="color:var(--gray); font-size:0.9rem; margin-bottom:20px"></p>
        <div id="alert-buttons" style="display:flex; gap:10px;"></div>
    </div>
</div>

<div id="pin-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px;">
        <h3 id="modal-title">Acceso</h3>
        <p id="pin-msg" style="color:var(--gray); font-size:0.8rem;"></p>
        <input type="password" id="pin-input" placeholder="****" inputmode="numeric" maxlength="4" style="text-align:center; font-size:2rem; letter-spacing:10px;">
        <button id="btn-confirmar-pin" class="btn-add">ENTRAR</button>
        <button onclick="cerrarModal('pin-modal')" style="background:#333">VOLVER</button>
    </div>
</div>

<div id="nuevo-perfil-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px;">
        <h3>Nuevo Perfil</h3>
        <input type="text" id="nuevo-nombre-input" placeholder="Nombre">
        <button onclick="guardarNuevoPerfil()" class="btn-add">CREAR</button>
        <button onclick="cerrarModal('nuevo-perfil-modal')" style="background:#333">CANCELAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCtAu5W-S48pICmS9H0k7mKLiJpNKHSoQ",
        authDomain: "finansas-ib.firebaseapp.com",
        projectId: "finansas-ib",
        storageBucket: "finansas-ib.firebasestorage.app",
        messagingSenderId: "699584425602",
        appId: "1:699584425602:web:0d793337469fbf02b00e9b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = "", transactions = [], totalAhorrado = 0, currentSaldoNeto = 0, clicsAdmin = 0, donutChart = null, areaChart = null;

    function mostrarCustomAlert(titulo, mensaje, esConfirmacion, accion) {
        document.getElementById('alert-title').innerText = titulo;
        document.getElementById('alert-msg').innerText = mensaje;
        const btnCont = document.getElementById('alert-buttons');
        btnCont.innerHTML = "";
        if (esConfirmacion) {
            btnCont.innerHTML = `<button onclick="cerrarModal('alert-modal')" style="background:#333; flex:1">NO</button><button id="btn-alert-si" style="background:var(--purple); flex:1">SÍ</button>`;
            document.getElementById('btn-alert-si').onclick = () => { accion(); cerrarModal('alert-modal'); };
        } else {
            btnCont.innerHTML = `<button onclick="cerrarModal('alert-modal')" style="background:var(--purple); flex:1">OK</button>`;
        }
        document.getElementById('alert-modal').classList.remove('hidden');
    }

    function activarAdmin() { clicsAdmin++; if (clicsAdmin === 7) { const p = prompt("Clave:"); if (p === "2026") document.getElementById('btn-admin-add').classList.remove('hidden'); clicsAdmin = 0; } }

    function inicializarApp() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
        cargarPerfiles();
    }

    function cargarPerfiles() {
        db.collection("config_perfiles").onSnapshot(snap => {
            const mainCont = document.getElementById('main-profiles-container');
            const guestCont = document.getElementById('guest-profiles-container');
            mainCont.innerHTML = ""; guestCont.innerHTML = "";
            snap.forEach(doc => {
                const nombre = doc.id;
                const inicial = nombre.charAt(0).toUpperCase();
                const esPrincipal = (nombre.toLowerCase() === "ignacio" || nombre.toLowerCase() === "claudia");
                const html = `<div onclick="intentarAcceso('${nombre}')" class="profile-card ${esPrincipal ? 'main' : 'guest'}"><div class="avatar">${inicial}</div><div class="name">${nombre}</div></div>`;
                if (esPrincipal) mainCont.innerHTML += html; else guestCont.innerHTML += html;
            });
        });
    }

    async function intentarAcceso(nombre) {
        const doc = await db.collection("config_perfiles").doc(nombre).get();
        const pin = doc.data().pin;
        document.getElementById('pin-modal').classList.remove('hidden');
        document.getElementById('pin-input').value = "";
        if (!pin || pin === "") {
            document.getElementById('modal-title').innerText = "Crear PIN";
            document.getElementById('pin-msg').innerText = "Elegí 4 números para tu perfil:";
            document.getElementById('btn-confirmar-pin').onclick = async () => {
                const np = document.getElementById('pin-input').value;
                if (np.length === 4) { await db.collection("config_perfiles").doc(nombre).update({ pin: np }); cerrarModal('pin-modal'); selectProfile(nombre); }
            };
        } else {
            document.getElementById('modal-title').innerText = "Hola " + nombre;
            document.getElementById('pin-msg').innerText = "Ingresá tu PIN:";
            document.getElementById('btn-confirmar-pin').onclick = () => {
                if(document.getElementById('pin-input').value === pin) { cerrarModal('pin-modal'); selectProfile(nombre); }
                else mostrarCustomAlert("Error", "PIN Incorrecto", false);
            };
        }
    }

    function selectProfile(name) {
        currentUser = name;
        document.getElementById('user-display').innerText = "Sesión: " + name;
        document.getElementById('profile-selection').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        iniciarEscuchas();
    }

    function iniciarEscuchas() {
        db.collection("movimientos").where("perfil", "==", currentUser).orderBy("timestamp", "desc").onSnapshot(snap => {
            transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderUI();
            if(!document.getElementById('tab-stats').classList.contains('hidden')) updateCharts();
        });
        db.collection("ahorros").doc(currentUser).onSnapshot(doc => {
            totalAhorrado = doc.exists ? doc.data().total : 0;
            document.getElementById('total-saved-big').innerText = "$" + totalAhorrado.toLocaleString();
        });
        db.collection("historial_cierres").where("perfil", "==", currentUser).orderBy("fecha", "desc").onSnapshot(snap => {
            const list = document.getElementById('meses-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="item-list"><span>${d.mes}</span><strong>$${d.monto.toLocaleString()}</strong></div>`;
            });
        });
    }

    function renderUI() {
        const list = document.getElementById('history-list'); list.innerHTML = "";
        let net = 0, spent = 0;
        transactions.forEach(t => {
            if(t.type === 'ingreso') net += t.amount; else { net -= t.amount; spent += t.amount; }
            let timeStr = "";
            if(t.timestamp) {
                const d = t.timestamp.toDate();
                timeStr = `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')} - ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}hs`;
            }
            list.innerHTML += `<div class="item-list" style="border-left: 4px solid ${t.type==='ingreso'?'var(--green)':'var(--red)'}"><div><strong>${t.desc}</strong><br><small style="color:#666; font-size:0.7rem">${timeStr}</small></div><div style="text-align:right"><div style="color:${t.type==='ingreso'?'var(--green)':'var(--red)'}">${t.type==='ingreso'?'+':'-'}$${t.amount.toLocaleString()}</div><button onclick="solicitarBorrar('${t.id}')" style="background:rgba(231, 76, 60, 0.1); color:var(--red); font-size:0.6rem; padding:4px 8px; width:auto; margin:5px 0 0 0; border-radius:5px">Eliminar</button></div></div>`;
        });
        document.getElementById('net-balance').innerText = "$" + net.toLocaleString();
        document.getElementById('total-spent-display').innerText = `-$${spent.toLocaleString()} gastados este mes`;
        currentSaldoNeto = net;
    }

    function solicitarBorrar(id) {
        mostrarCustomAlert("¿Eliminar?", "¿Seguro querés borrar este movimiento?", true, () => {
            db.collection("movimientos").doc(id).delete();
        });
    }

    function addEntry(type) {
        const amount = parseFloat(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if (!amount || !desc) return;
        db.collection("movimientos").add({ amount, desc, cat: document.getElementById('cat').value, type, perfil: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('amount').value = ""; document.getElementById('desc').value = "";
        showTab('home');
    }

    function abrirCierreMes() {
        if (currentSaldoNeto <= 0) { mostrarCustomAlert("Aviso", "No hay saldo positivo para ahorrar.", false); return; }
        mostrarCustomAlert("Cerrar Mes", "¿Querés guardar el saldo en tus ahorros y limpiar el mes?", true, ejecutarCierreMes);
    }

    function ejecutarCierreMes() {
        const mesAnio = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        db.collection("historial_cierres").add({ perfil: currentUser, mes: mesAnio, monto: currentSaldoNeto, fecha: firebase.firestore.FieldValue.serverTimestamp() });
        db.collection("ahorros").doc(currentUser).set({ total: totalAhorrado + currentSaldoNeto })
        .then(() => { transactions.forEach(t => db.collection("movimientos").doc(t.id).delete()); });
    }

    function updateCharts() {
        const gastos = transactions.filter(t => t.type === 'gasto');
        const cats = [...new Set(gastos.map(g => g.cat))];
        const donutData = cats.map(c => gastos.filter(g => g.cat === c).reduce((s, curr) => s + curr.amount, 0));
        const ctxD = document.getElementById('donutChart').getContext('2d');
        if(donutChart) donutChart.destroy();
        donutChart = new Chart(ctxD, { type: 'doughnut', data: { labels: cats, datasets: [{ data: donutData, backgroundColor: ['#8e44ad', '#2ecc71', '#e74c3c', '#f1c40f', '#3498db'] }] }, options: { plugins: { legend: { labels: { color: '#aaa' } } } } });
        
        const movs = [...transactions].sort((a,b) => (a.timestamp?a.timestamp.toDate():0) - (b.timestamp?b.timestamp.toDate():0));
        let s = 0; const labels = []; const data = [];
        movs.forEach(t => { if(!t.timestamp) return; const f = t.timestamp.toDate().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}); if(t.type === 'ingreso') s += t.amount; else s -= t.amount; if(labels[labels.length-1] === f) data[data.length-1] = s; else { labels.push(f); data.push(s); } });
        const ctxA = document.getElementById('areaChart').getContext('2d');
        if(areaChart) areaChart.destroy();
        areaChart = new Chart(ctxA, { type: 'line', data: { labels: labels, datasets: [{ label: 'Saldo', data: data, fill: true, backgroundColor: 'rgba(52, 152, 219, 0.2)', borderColor: '#3498db', tension: 0.3 }] }, options: { plugins: { legend: { display: false } } } });
    }

    function showTab(t) {
        ['home', 'stats', 'ahorros', 'add'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('nav-'+(t==='add'?'home':t)); if(btn) btn.classList.add('active');
        if(t === 'stats') setTimeout(updateCharts, 100);
    }

    function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
    function abrirCrearPerfil() { document.getElementById('nuevo-perfil-modal').classList.remove('hidden'); }
    async function guardarNuevoPerfil() {
        const n = document.getElementById('nuevo-nombre-input').value.trim();
        if(n) { await db.collection("config_perfiles").doc(n).set({ pin: "" }); cerrarModal('nuevo-perfil-modal'); }
    }

    inicializarApp();
</script>
</body>
</html>
