<div id="profile-selection">
    <h1>Finansas IB</h1>
    <button onclick="selectProfile('Ignacio')" style="background:var(--purple); color:white">Ignacio</button>
    <button onclick="selectProfile('Claudia')" style="background:#fd79a8; color:white">Claudia</button>
</div>

<div id="main-dashboard" class="hidden">
    <div class="flex-between">
        <h2 id="user-display"></h2>
        <button onclick="logout()" style="width:auto; background:#333; color:white">Salir</button>
    </div>

    <div style="display:flex; gap:5px; margin-bottom:15px">
        <button onclick="showTab('home')" style="background:#444; color:white">Home</button>
        <button onclick="showTab('stats')" style="background:#444; color:white">Stats</button>
        <button onclick="showTab('calendar')" style="background:#444; color:white">Meses</button>
    </div>

    <div id="tab-home" class="tab-content">
        <div class="card">
            <small>Saldo Neto Actual</small>
            <h1 id="net-balance" style="color:var(--green); margin:5px 0">$0</h1>
            <hr style="border:0; border-top:1px solid #333">
            <small>Total Ahorrado Caja</small>
            <h2 id="total-saved-big" style="margin:5px 0">$0</h2>
        </div>
        <button onclick="showTab('add')" style="background:var(--green); color:white">+ MOVIMIENTO</button>
        <button onclick="transferBalanceToSavings()" style="background:var(--purple); color:white">CERRAR MES (Ahorrar)</button>
        <h3>Historial</h3>
        <div id="history-list"></div>
    </div>

    <div id="tab-stats" class="tab-content hidden">
        <h3>Gastos por Categoría</h3>
        <canvas id="myChart" style="width:100%; max-width:400px"></canvas>
    </div>

    <div id="tab-calendar" class="tab-content hidden">
        <h3>Meses Anteriores</h3>
        <div id="calendar-list"></div>
    </div>

    <div id="tab-add" class="tab-content hidden">
        <h2>Nuevo Registro</h2>
        <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
        <input type="text" id="desc" placeholder="Descripción">
        <select id="cat">
            <option value="Comida">Comida</option>
            <option value="Servicios">Servicios</option>
            <option value="Nafta">Nafta</option>
            <option value="Varios">Varios</option>
        </select>
        <button onclick="addEntry('gasto')" style="background:var(--red); color:white">GASTO</button>
        <button onclick="addEntry('ingreso')" style="background:var(--green); color:white">INGRESO</button>
        <button onclick="showTab('home')" style="background:#444; color:white">VOLVER</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
