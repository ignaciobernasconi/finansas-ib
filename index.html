<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansas IB Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --purple: #6c5ce7; 
            --green: #00b894; --red: #d63031; --text: #ffffff; --gray: #aaa;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 450px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border-left: 6px solid var(--purple); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;
        }
        button { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; 
            border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        .btn-add { background: var(--green); }
        .btn-save { background: var(--purple); }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            background: #252525; color: white; border: 1px solid #333; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .profile-card {
            background: var(--card); padding: 20px; border-radius: 15px;
            border-bottom: 4px solid var(--purple); cursor: pointer; transition: 0.3s;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center;
            z-index: 10000; backdrop-filter: blur(8px);
        }
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-menu button { background: #333; flex: 1; padding: 10px; font-size: 0.8rem; margin: 0; }
        .item-list { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="profile-selection">
        <h1 id="main-title" onclick="activarAdmin()" style="text-align:center; margin-bottom:5px; cursor:default">Finansas IB</h1>
        <p style="text-align:center; color:var(--gray); margin-bottom:30px">¿Quién está usando la app?</p>
        <div id="profiles-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:15px"></div>
        
        <button id="btn-admin-add" onclick="abrirCrearPerfil()" class="hidden" style="background:transparent; border:2px dashed var(--purple); color:var(--purple); margin-top:30px">
            + AGREGAR PERFIL (ADMIN)
        </button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px">
            <h2 id="user-display" style="margin:0; font-size: 1.1rem;"></h2>
            <button onclick="location.reload()" style="width:auto; background:#333; padding:5px 12px; margin:0; font-size:0.7rem">Salir</button>
        </div>
        <div class="nav-menu">
            <button onclick="showTab('home')">HOME</button>
            <button onclick="showTab('stats')">STATS</button>
        </div>
        <div id="tab-home">
            <div class="card">
                <small style="color:var(--gray)">Saldo del Mes</small>
                <h1 id="net-balance" style="color:var(--green); margin:5px 0; font-size: 2.3rem;">$0</h1>
                <h3 id="total-spent" style="color:var(--red); margin:0; font-size: 1.1rem; font-weight: normal; opacity: 0.9;">-$0</h3>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0">
                <small style="color:var(--gray)">Ahorro Total</small>
                <h2 id="total-saved-big" style="color:var(--purple); margin:5px 0">$0</h2>
            </div>
            <button class="btn-add" onclick="showTab('add')">+ NUEVO MOVIMIENTO</button>
            <button class="btn-save" onclick="cerrarMesAutomatico()">🔒 CERRAR MES</button>
            <div id="history-list" style="margin-top:20px"></div>
        </div>
        <div id="tab-add" class="hidden">
            <h2>Nuevo Registro</h2>
            <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
            <input type="text" id="desc" placeholder="Descripción">
            <select id="cat">
                <option value="Comida">Comida</option><option value="Servicios">Servicios</option>
                <option value="Nafta">Nafta</option><option value="Varios">Varios</option>
            </select>
            <div style="display:flex; gap:10px">
                <button onclick="addEntry('gasto')" style="background:var(--red)">GASTO</button>
                <button onclick="addEntry('ingreso')" style="background:var(--green)">INGRESO</button>
            </div>
            <button onclick="showTab('home')" style="background:#444">VOLVER</button>
        </div>
        <div id="tab-stats" class="hidden"><canvas id="myChart"></canvas></div>
    </div>
</div>

<div id="pin-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px; border-left: 6px solid var(--purple);">
        <h3 style="margin:0">Seguridad</h3>
        <p id="pin-msg" style="color:var(--gray); font-size:0.8rem; margin-bottom:15px"></p>
        <input type="password" id="pin-input" placeholder="****" inputmode="numeric" maxlength="4" style="text-align:center; font-size:2rem; letter-spacing:15px;">
        <div style="display:flex; gap:10px; margin-top:10px">
            <button id="btn-confirmar-pin" class="btn-add">ENTRAR</button>
            <button onclick="cerrarModal('pin-modal')" style="background:#444">VOLVER</button>
        </div>
    </div>
</div>

<div id="nuevo-perfil-modal" class="modal-overlay hidden">
    <div class="card" style="width:85%; max-width:320px; border-left: 6px solid var(--green);">
        <h3 style="margin:0">Nuevo Perfil</h3>
        <p style="color:var(--gray); font-size:0.8rem; margin-bottom:15px">Configurá el acceso</p>
        <input type="text" id="nuevo-nombre-input" placeholder="Nombre">
        <input type="password" id="nuevo-pin-input" placeholder="PIN (4 números)" inputmode="numeric" maxlength="4" style="text-align:center; letter-spacing:5px;">
        <div style="display:flex; gap:10px; margin-top:10px">
            <button onclick="guardarNuevoPerfil()" class="btn-add">CREAR</button>
            <button onclick="cerrarModal('nuevo-perfil-modal')" style="background:#444">CANCELAR</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCtAu5W-S48pICmS9H0k7mKLiJpNKHSoQ",
        authDomain: "finansas-ib.firebaseapp.com",
        projectId: "finansas-ib",
        storageBucket: "finansas-ib.firebasestorage.app",
        messagingSenderId: "699584425602",
        appId: "1:699584425602:web:0d793337469fbf02b00e9b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = "", transactions = [], totalAhorrado = 0, currentSaldoNeto = 0;
    let clicsAdmin = 0;

    // --- TRUCO DE ADMINISTRADOR ---
    function activarAdmin() {
        clicsAdmin++;
        if (clicsAdmin === 7) { // Tocá 7 veces el título "Finansas IB"
            const pass = prompt("Clave Maestra:");
            if (pass === "2026") { // CAMBIÁ ESTA CLAVE SI QUERÉS
                document.getElementById('btn-admin-add').classList.remove('hidden');
                alert("🔓 Modo Administrador: Botón activado.");
            }
            clicsAdmin = 0;
        }
    }

    function inicializarApp() {
        document.getElementById('pin-modal').classList.add('hidden');
        document.getElementById('nuevo-perfil-modal').classList.add('hidden');
        document.getElementById('main-dashboard').classList.add('hidden');
        document.getElementById('btn-admin-add').classList.add('hidden'); // Siempre empieza oculto
        cargarPerfiles();
    }

    function cargarPerfiles() {
        db.collection("config_perfiles").onSnapshot(snap => {
            const grid = document.getElementById('profiles-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                grid.innerHTML += `
                    <div onclick="intentarAcceso('${doc.id}')" class="profile-card">
                        <div style="font-size:2.5rem; margin-bottom:10px">👤</div>
                        <strong>${doc.id}</strong>
                    </div>`;
            });
        });
    }

    async function intentarAcceso(nombre) {
        const doc = await db.collection("config_perfiles").doc(nombre).get();
        const pinCorrecto = doc.data().pin;
        document.getElementById('pin-modal').classList.remove('hidden');
        document.getElementById('pin-msg').innerText = "Ingresá la clave de " + nombre;
        document.getElementById('pin-input').value = "";
        document.getElementById('pin-input').focus();
        document.getElementById('btn-confirmar-pin').onclick = () => {
            if(document.getElementById('pin-input').value === pinCorrecto) {
                cerrarModal('pin-modal'); selectProfile(nombre);
            } else { alert("❌ PIN Incorrecto"); }
        };
    }

    function abrirCrearPerfil() {
        document.getElementById('nuevo-perfil-modal').classList.remove('hidden');
    }

    async function guardarNuevoPerfil() {
        const n = document.getElementById('nuevo-nombre-input').value.trim();
        const p = document.getElementById('nuevo-pin-input').value.trim();
        if(n && p.length >= 4) {
            await db.collection("config_perfiles").doc(n).set({ pin: p });
            cerrarModal('nuevo-perfil-modal');
            document.getElementById('btn-admin-add').classList.add('hidden'); // Se oculta tras usarlo
        }
    }

    function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }

    function selectProfile(name) {
        currentUser = name;
        document.getElementById('user-display').innerText = "Perfil: " + name;
        document.getElementById('profile-selection').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        iniciarEscuchas();
    }

    function iniciarEscuchas() {
        db.collection("movimientos").where("perfil", "==", currentUser).orderBy("timestamp", "desc").onSnapshot(snap => {
            transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderUI();
        });
        db.collection("ahorros").doc(currentUser).onSnapshot(doc => {
            totalAhorrado = doc.exists ? doc.data().total : 0;
            document.getElementById('total-saved-big').innerText = "$" + totalAhorrado.toLocaleString();
        });
    }

    function renderUI() {
        const list = document.getElementById('history-list'); list.innerHTML = "";
        let net = 0, spent = 0;
        transactions.forEach(t => {
            if(t.type === 'ingreso') net += t.amount; else { net -= t.amount; spent += t.amount; }
            list.innerHTML += `
                <div class="item-list" style="border-left: 5px solid ${t.type==='ingreso'?'var(--green)':'var(--red)'}">
                    <div><strong>${t.desc}</strong><br><small>${t.cat}</small></div>
                    <div style="text-align:right">
                        <div style="font-weight:bold; color:${t.type==='ingreso'?'var(--green)':'var(--red)'}">$${t.amount.toLocaleString()}</div>
                        <button onclick="borrarDato('${t.id}')" style="background:none; color:var(--red); font-size:0.7rem; border:none; padding:0">Borrar</button>
                    </div>
                </div>`;
        });
        document.getElementById('net-balance').innerText = "$" + net.toLocaleString();
        document.getElementById('total-spent').innerText = "-$" + spent.toLocaleString();
        currentSaldoNeto = net;
    }

    function addEntry(type) {
        const amount = parseFloat(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if (!amount || !desc) return;
        db.collection("movimientos").add({
            amount, desc, cat: document.getElementById('cat').value, type,
            perfil: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('amount').value = ""; document.getElementById('desc').value = "";
        showTab('home');
    }

    function showTab(t) {
        ['home', 'stats', 'add'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
    }

    function borrarDato(id) { if(confirm("¿Borrar?")) db.collection("movimientos").doc(id).delete(); }

    function cerrarMesAutomatico() {
        if (currentSaldoNeto <= 0) return alert("Nada que ahorrar.");
        if (confirm(`¿Ahorrar $${currentSaldoNeto.toLocaleString()}?`)) {
            db.collection("ahorros").doc(currentUser).set({ total: totalAhorrado + currentSaldoNeto })
            .then(() => transactions.forEach(t => db.collection("movimientos").doc(t.id).delete()));
        }
    }

    inicializarApp();
</script>
</body>
</html>
