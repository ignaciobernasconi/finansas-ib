<div id="profile-selection">
    <h1>Finansas IB</h1>
    <button onclick="selectProfile('Ignacio')" style="background: #6c5ce7; color: white;">Ignacio</button>
    <button onclick="selectProfile('Claudia')" style="background: #fd79a8; color: white;">Claudia</button>
</div>

<div id="main-dashboard" class="hidden">
    <div class="flex-between">
        <h2 id="user-display"></h2>
        <button onclick="logout()" style="width:auto; background:#333; color:white; padding:5px 10px;">Salir</button>
    </div>
    
    <div class="card">
        <small>Saldo Neto</small>
        <h1 id="net-balance" style="color:#00b894">$0</h1>
    </div>
    
    <button onclick="showTab('add')" style="background:#00b894; color:white;">+ NUEVO MOVIMIENTO</button>
    
    <h3>Historial</h3>
    <div id="history-list">Cargando...</div>
</div>

<div id="tab-add" class="hidden">
    <h2>Cargar Movimiento</h2>
    <input type="number" id="amount" placeholder="Monto $" inputmode="decimal">
    <input type="text" id="desc" placeholder="Descripción">
    <select id="cat">
        <option value="Comida">Comida / Súper</option>
        <option value="Servicios">Servicios</option>
        <option value="Nafta">Nafta / Transporte</option>
        <option value="Varios">Varios</option>
    </select>
    <button onclick="addEntry('gasto')" style="background:#d63031; color:white;">ES GASTO</button>
    <button onclick="addEntry('ingreso')" style="background:#00b894; color:white;">ES INGRESO</button>
    <button onclick="showTab('home')" style="background:#444; color:white;">VOLVER</button>
</div>
